<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Sentinel | Cyber-Security Protocol</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap');

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #10131a;
            color: #bbc6e2;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .nav-item.active {
            color: #00e1ab;
            border-top: 2px solid #00e1ab;
        }

        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00e1ab, transparent);
            box-shadow: 0 0 15px #00e1ab;
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            opacity: 0.4;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0%   { top: 0; }
            100% { top: 100%; }
        }

        /* Tip fade transition */
        #tipText {
            transition: opacity 0.5s ease;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="pb-24">

    <header class="fixed top-0 w-full z-50 bg-[#10131a]/80 backdrop-blur-md border-b border-[#00e1ab]/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[#00e1ab]">security</span>
            <h1 class="font-bold tracking-[0.2em] text-[#00e1ab] text-lg">SENTINEL</h1>
        </div>
    </header>

    <main class="mt-20 px-4">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>
</body>
</html>
